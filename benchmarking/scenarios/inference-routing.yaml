name: inference-routing
description: Full inference routing
gatewayClass: kgateway
enableInferenceRouting: true
enableBodyParsing: true
dataType: shareGPT
targetRPS: 100
durationSeconds: 120
concurrentUsers: 20
warmupSeconds: 15
backendTiers:
  - name: tier-large
    cpuLimit: "2000m"
    memoryLimit: "2Gi"
    responseDelayMs: 20
    replicas: 1
    labels:
      tier: large
    simulatedKVCachePercent: 30
  - name: tier-medium
    cpuLimit: "1000m"
    memoryLimit: "1Gi"
    responseDelayMs: 45
    replicas: 1
    labels:
      tier: medium
    simulatedKVCachePercent: 60
  - name: tier-small
    cpuLimit: "500m"
    memoryLimit: "512Mi"
    responseDelayMs: 80
    replicas: 1
    labels:
      tier: small
    simulatedKVCachePercent: 80
