apiVersion: batch/v1
kind: Job
metadata:
  name: inference-perf
spec:
  backoffLimit: {{ .Values.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  template:
    spec:
      containers:
      - name: perf
        image: {{ .Values.image }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        args:
        - --config_file
        - /workspace/config.yml
        volumeMounts:
        - name: config
          mountPath: /workspace/config.yml
          subPath: config.yml
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: inference-perf-config
          items:
          - key: config.yml
            path: config.yml
      restartPolicy: Never