name: "Inference Routing Benchmark"
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - benchmarking/**

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Kind
        run: go install sigs.k8s.io/kind@v0.22.0
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Setup Kind Cluster
        run: bash scripts/setup-kind.sh
      - name: Run Benchmarks
        run: go run ./benchmarking/cmd/runner --scenario all --output benchmarking/results/ --threshold 20
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarking/results/
          retention-days: 30
