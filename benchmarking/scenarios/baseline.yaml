name: baseline
description: Direct-to-simulator baseline (gateway bypass)
gatewayClass: kgateway
directToSimulator: true
enableInferenceRouting: false
enableBodyParsing: false
dataType: synthetic
targetRPS: 100
durationSeconds: 120
concurrentUsers: 10
warmupSeconds: 60
backendTiers:
  - name: tier-large
    cpuLimit: "4"
    memoryLimit: "4Gi"
    responseDelayMs: 50
    replicas: 2
    labels:
      app: llm-d-sim
      tier: large
    simulatedKVCachePercent: 0
