apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-sim-small
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-sim
      tier: small
  template:
    metadata:
      labels:
        app: llm-d-sim
        tier: small
    spec:
      containers:
      - name: sim
        image: ghcr.io/llm-d/llm-d-inference-sim:latest
        imagePullPolicy: IfNotPresent
        args:
        - cmd
        - --model
        - meta-llama/Llama-3-8b
        - --port
        - "8000"
        - --mode
        - random
        - --time-to-first-token
        - "200ms"
        - --inter-token-latency
        - "12ms"
        env:
        - name: RESPONSE_DELAY_MS
          value: "200"
        - name: MODEL_ID
          value: "meta-llama/Llama-3-8b"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-sim-small
  namespace: default
spec:
  selector:
    app: llm-d-sim
    tier: small
  ports:
  - port: 8000
    targetPort: 8000
