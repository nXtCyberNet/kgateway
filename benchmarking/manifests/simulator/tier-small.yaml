apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-sim-small
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-sim
      tier: small
  template:
    metadata:
      labels:
        app: llm-d-sim
        tier: small
    spec:
      containers:
      - name: sim
        image: ghcr.io/llm-d/llm-d-inference-sim:latest
        env:
        - name: RESPONSE_DELAY_MS
          value: "200"
        - name: MODEL_ID
          value: "meta-llama/Llama-3-8b"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-sim-small
  namespace: default
spec:
  selector:
    app: llm-d-sim
    tier: small
  ports:
  - port: 8000
    targetPort: 8000
