name: 1-direct
description: "Baseline scenario sending traffic directly to backends"
gatewayClass: kgateway
enableInferenceRouting: false
enableBodyParsing: false
targetRPS: 50
durationSeconds: 60
concurrentUsers: 5
warmupSeconds: 10
backendTiers:
  - name: tier-large
    cpuLimit: "2000m"
    memoryLimit: "2Gi"
    responseDelayMs: 20
    replicas: 1
    labels:
      tier: large
    simulatedKVCachePercent: 30
