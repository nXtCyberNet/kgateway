apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-perf-config
data:
  config.yml: |
    load:
      type: constant
      stages:
      - rate: {{ .Values.targetRps }}
        duration: {{ .Values.durationSeconds }}
      num_workers: {{ .Values.concurrentUsers }}
    api:
      type: {{ .Values.apiType | quote }}
      streaming: {{ .Values.streaming }}
    server:
      type: {{ .Values.serverType | quote }}
      model_name: {{ .Values.modelName | quote }}
      base_url: {{ .Values.scenarioUrl | quote }}
    data:
      type: {{ .Values.dataType | quote }}
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: false