apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-sim-large
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-d-sim
      tier: large
  template:
    metadata:
      labels:
        app: llm-d-sim
        tier: large
    spec:
      containers:
      - name: sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2
        imagePullPolicy: IfNotPresent
        args:
        - cmd
        - --model
        - meta-llama/Llama-3-8b
        - --port
        - "8000"
        - --time-to-first-token
        - "50ms"
        - --inter-token-latency
        - "5ms"
        env:
        - name: RESPONSE_DELAY_MS
          value: "50"
        - name: MODEL_ID
          value: "meta-llama/Llama-3-8b"
        resources:
          requests:
            cpu: "300m"
            memory: "512Mi"
          limits:
            cpu: "4"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-sim-large
  namespace: default
spec:
  selector:
    app: llm-d-sim
    tier: large
  ports:
  - port: 8000
    targetPort: 8000
