apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-sim-medium
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-sim
      tier: medium
  template:
    metadata:
      labels:
        app: llm-d-sim
        tier: medium
    spec:
      containers:
      - name: sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.7.1
        imagePullPolicy: IfNotPresent
        args:
        - cmd
        - --model
        - meta-llama/Llama-3-8b
        - --port
        - "8000"
        - --time-to-first-token
        - "100ms"
        - --inter-token-latency
        - "8ms"
        env:
        - name: RESPONSE_DELAY_MS
          value: "100"
        - name: MODEL_ID
          value: "meta-llama/Llama-3-8b"
        resources:
          requests:
            cpu: "200m"
            memory: "384Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-sim-medium
  namespace: default
spec:
  selector:
    app: llm-d-sim
    tier: medium
  ports:
  - port: 8000
    targetPort: 8000
